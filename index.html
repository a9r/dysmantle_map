<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYSMANTLE 交互式地图</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+SC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #08090b;
    --panel:   #10141a;
    --panel2:  #161c26;
    --border:  #1e2a3a;
    --accent:  #d4952a;
    --accent2: #4cc9f0;
    --red:     #ef4444;
    --gold:    #fbbf24;
    --purple:  #a78bfa;
    --green:   #4ade80;
    --blue:    #60a5fa;
    --text:    #c8d4e0;
    --dim:     #4a5c72;
    --radius:  4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; }

  /* ── LAYOUT ─────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── TOP BAR ─────────────────────────────────── */
  #topbar {
    flex-shrink: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 14px;
    height: 46px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1000;
  }
  #topbar::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
    opacity: .4;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .logo-sub { font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-left: 8px; font-weight: 400; }

  .sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  /* filter chips */
  .filters { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Noto Sans SC', sans-serif;
    white-space: nowrap;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chip.on  { background: rgba(255,255,255,.05); color: var(--text); border-color: rgba(255,255,255,.15); }
  .chip:hover { border-color: var(--accent); }

  .ml-auto { margin-left: auto; }
  .coord-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    min-width: 160px;
    text-align: center;
  }

  /* ── BODY ─────────────────────────────────── */
  #body { flex: 1; display: flex; overflow: hidden; }

  /* ── LEFT SIDEBAR ─────────────────────────────── */
  #sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 8px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #regionList { overflow-y: auto; flex: 1; }
  #regionList::-webkit-scrollbar { width: 3px; }
  #regionList::-webkit-scrollbar-thumb { background: var(--border); }
  .ritem {
    padding: 7px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .12s;
    display: flex;
    align-items: center;
    gap: 7px;
    border-bottom: 1px solid rgba(30,42,58,.5);
  }
  .ritem:hover { background: rgba(212,149,42,.06); border-left-color: rgba(212,149,42,.4); }
  .ritem.active { background: rgba(212,149,42,.1); border-left-color: var(--accent); }
  .rdot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .rname { font-size: 12px; font-weight: 700; }
  .ren   { font-size: 10px; color: var(--dim); }

  /* ── MAP ─────────────────────────────────── */
  #map { flex: 1; }

  /* Leaflet overrides */
  .leaflet-container { background: #060810; }
  .leaflet-control-zoom { border: 1px solid var(--border) !important; background: var(--panel) !important; }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
    font-size: 16px !important;
    line-height: 26px !important;
  }
  .leaflet-control-zoom a:hover { background: var(--panel2) !important; color: var(--accent) !important; }

  /* ── POPUP ─────────────────────────────────── */
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,.6) !important;
    color: var(--text) !important;
    padding: 0 !important;
    min-width: 240px;
    max-width: 320px;
  }
  .leaflet-popup-tip { background: var(--border) !important; }
  .leaflet-popup-content { margin: 0 !important; }
  .popup-inner { padding: 12px 14px; }
  .popup-type {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 4px;
  }
  .popup-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 2px;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: .5px;
  }
  .popup-region { font-size: 11px; color: var(--dim); margin-bottom: 8px; }
  .popup-coords { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--accent2); margin-bottom: 8px; }
  .popup-desc { font-size: 12px; line-height: 1.6; color: var(--text); }
  .popup-divider { height: 1px; background: var(--border); margin: 10px 0; }
  .popup-quest-title { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
  .popup-step {
    font-size: 11px;
    color: var(--dim);
    padding: 2px 0 2px 12px;
    position: relative;
    line-height: 1.55;
  }
  .popup-step::before { content: '▸'; position:absolute; left:0; color: var(--accent2); font-size:9px; top:3px; }
  .popup-reward { margin-top:7px; font-size:11px; color: var(--gold); padding-left:4px; }
  .popup-reward::before { content: '✦ 奖励: '; }
  .popup-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 2px;
    margin-bottom: 6px;
  }
  .badge-main   { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
  .badge-side   { background: rgba(96,165,250,.15);  color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }
  .badge-key    { background: rgba(239,68,68,.15);   color: #ef4444; border: 1px solid rgba(239,68,68,.3); }

  /* ── RIGHT PANEL ─────────────────────────────── */
  #questPanel {
    width: 300px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #questPanelTitle {
    padding: 8px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #questList { overflow-y: auto; flex: 1; padding: 8px; }
  #questList::-webkit-scrollbar { width: 3px; }
  #questList::-webkit-scrollbar-thumb { background: var(--border); }
  .qcard {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 7px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .qcard:hover { border-color: rgba(212,149,42,.4); }
  .qcard.highlight { border-color: var(--accent) !important; box-shadow: 0 0 10px rgba(212,149,42,.2); }
  .qcard-head {
    padding: 8px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,.02);
  }
  .qcard-head:hover { background: rgba(255,255,255,.04); }
  .qtype { font-size: 9px; padding: 1px 5px; border-radius: 2px; flex-shrink: 0; }
  .qcard-name { font-size: 12px; font-weight: 700; flex: 1; }
  .qcard-area { font-size: 10px; color: var(--dim); flex-shrink: 0; }
  .qcard-body { padding: 0 10px 9px; display: none; }
  .qcard-body.open { display: block; }
  .qcard-coord { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--accent2); margin-bottom: 5px; margin-top: 4px; }
  .qstep { font-size: 11px; color: var(--dim); padding: 2px 0 2px 12px; position: relative; line-height: 1.5; }
  .qstep::before { content:'▸'; position:absolute; left:0; color: var(--accent2); font-size:9px; top:3px; }
  .qreward { margin-top:6px; font-size:11px; color: var(--gold); }
  .qreward::before { content:'✦ 奖励: '; }
  .empty-msg { padding: 20px; text-align: center; color: var(--dim); font-size: 12px; }

  /* Custom marker icons */
  .map-icon-wrap {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid currentColor;
    background: rgba(0,0,0,.65);
    transition: transform .1s;
  }
  .map-icon-wrap img { width: 20px; height: 20px; image-rendering: pixelated; }

  /* Legend */
  #legend {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 900;
    background: rgba(10,14,20,.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    pointer-events: none;
  }
  .legend-title { font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing:2px; text-transform: uppercase; color: var(--accent); margin-bottom: 7px; }
  .legend-row { display: flex; align-items: center; gap: 7px; padding: 2px 0; font-size: 11px; color: var(--dim); }
  .legend-icon { width: 18px; height: 18px; image-rendering: pixelated; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo">DYSMANTLE <span class="logo-sub">交互式地图 · 主岛</span></div>
    <div class="sep"></div>
    <div class="filters" id="filterBar"></div>
    <div class="ml-auto"></div>
    <div class="coord-display" id="coordDisplay">坐标: — , —</div>
  </div>

  <!-- BODY -->
  <div id="body">

    <!-- LEFT: Region list -->
    <div id="sidebar">
      <div class="sidebar-title">▸ 地图区域</div>
      <div id="regionList"></div>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- RIGHT: Quest panel -->
    <div id="questPanel">
      <div id="questPanelTitle">▸ 全部任务攻略</div>
      <div id="questList"></div>
    </div>

  </div>
</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ════════════════════════════════════════════════
// COORDINATE SYSTEM
// ogmods uses L.CRS.Simple
// maxBounds: [[0,0],[-384,768]]  (lat goes negative = south, lng positive = east)
// mapNativeMaxZoom = 5
// Conversion: gameX° → pixel_x = gameX * 12.8  (at zoom 5)
//             gameY° → pixel_y = gameY * 12.8
// Then: latlng = map.unproject([px, py], 5)
// ════════════════════════════════════════════════
const TILE_BASE   = 'https://ogmods.github.io/dysmantle-map/tiles/{z}/{x}/{y}.jpg';
const ICON_BASE   = 'https://ogmods.github.io/dysmantle-map/images/icons/';
const NATIVE_ZOOM = 5;
const RATIO       = 12.8;           // game units → pixels at zoom 5

// Leaflet map bounds
const SW = [-384, 0];
const NE = [0,  768];

// ── MAP INIT ──────────────────────────────────────
const map = L.map('map', {
  crs:              L.CRS.Simple,
  maxZoom:          7,
  minZoom:          1,
  maxBounds:        [SW, NE],
  maxBoundsViscosity: 0.7,
  attributionControl: false,
  zoomControl:      true,
});
map.fitBounds([SW, NE]);

// Tile layer
L.tileLayer(TILE_BASE, {
  maxNativeZoom: NATIVE_ZOOM,
  minNativeZoom: 1,
  tms: false,
  bounds: [SW, NE],
  errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
}).addTo(map);

// Coordinate display on mousemove
map.on('mousemove', e => {
  const pt = map.project(e.latlng, NATIVE_ZOOM);
  const gx = Math.round(pt.x / RATIO);
  const gy = Math.round(pt.y / RATIO);
  document.getElementById('coordDisplay').textContent = `坐标: ${gx}°, ${gy}°`;
});

// ── COORDINATE CONVERSION ──────────────────────
function gameToLatLng(gx, gy) {
  // gx, gy are in game-unit degrees
  const px = gx * RATIO;
  const py = gy * RATIO;
  return map.unproject([px, py], NATIVE_ZOOM);
}

// ── ICON FACTORY ──────────────────────────────────
const iconCache = {};
function mkIcon(name, color) {
  const key = name + color;
  if (iconCache[key]) return iconCache[key];
  const icon = L.divIcon({
    className: '',
    html: `<div class="map-icon-wrap" style="color:${color};border-color:${color}">
             <img src="${ICON_BASE}${name}.png" onerror="this.style.display='none'"/>
           </div>`,
    iconSize:   [32, 32],
    iconAnchor: [16, 16],
    popupAnchor:[0, -18],
  });
  iconCache[key] = icon;
  return icon;
}

// ════════════════════════════════════════════════
// QUEST DATA
// ════════════════════════════════════════════════
const QUESTS = {
  q_crowbar:    { type:'side', name:'撬棍摧毁障碍',   en:'Crowbar Through Obstacles',   steps:['找废金属×2、废木料×5','在营火升级撬棍','摧毁堵住门口的柜子（1335°,537°）'], reward:'600 XP' },
  q_basic:      { type:'side', name:'初级必需品',     en:'Basic Necessities',            steps:['找到链塔(1391°,527°)','升级背包（植物物质×10，废织物×4）','提升人物等级'], reward:'1000 XP' },
  q_stronger:   { type:'side', name:'变强',           en:'Getting Stronger',             steps:['制作烹饪锅（废金属×8，陶瓷×5）','烹饪番茄汤（食谱在1371°,513°）','发明飞刀'], reward:'1500 XP' },
  q_basketball: { type:'side', name:'棒球',           en:'Fast Basketball',              steps:['在60秒内击败5个敌人'], reward:'3000 XP' },
  q_buried:     { type:'side', name:'埋藏宝藏',       en:'Buried Treasures',             steps:['获取藏宝地图','挖掘 1430°,533°','挖掘 1413°,548°','需铁锹（LV.4）'], reward:'3500 XP' },
  q_farming:    { type:'side', name:'初级农作物',     en:'Farming Basics',               steps:['发明种子袋（LV.5）','种植种子（玉米在1488°,465°箱）','收获农作物'], reward:'4500 XP' },
  q_building:   { type:'key',  name:'建筑工程',       en:'Construction Work',            steps:['发明建筑工具（LV.9）','建造3×3混泥土平台','建造木墙/门/家具','建造木门（需稀有木材）'], reward:'归家传送门秘诀 + 1500 XP' },
  q_fishing:    { type:'side', name:'钓鱼',           en:'Fish You Were Here',           steps:['发明鱼竿（LV.6，废木料×16）','钓3条鱼（任何水域均可）'], reward:'4500 XP' },
  q_haymaker:   { type:'side', name:'干草机',         en:'Haymaker',                     steps:['75秒内击败6个敌人'], reward:'5000 XP' },
  q_shipment:   { type:'side', name:'运输',           en:'Phony Shipment',               steps:['找路边病房贮存钥匙（1214°,364°）','打开1247°,401°上锁的门'], reward:'5000 XP' },
  q_terminal_n: { type:'key',  name:'破碎的北航站楼', en:'Broken Northern Terminal',     steps:['带废弃电子×8、橡胶×5','修理终端（1172°,369°）','完成后打开大门→爱尔兰'], reward:'8500 XP（解锁爱尔兰）' },

  q_prison:     { type:'key',  name:'闯入监狱',       en:'Prison Break-In',              steps:['阅读1430°,146°线索','前往柴火警察局1522°,363°取钥匙','返回北欧化工进入监狱（含燃料电池）'], reward:'15000 XP（关键主线道具）' },

  q_getaway:    { type:'side', name:'逃跑路径',       en:'Getaway Cut Short',            steps:['在办公室1150°,675°找"房间号4"提示','在马桶1148°,679°找车钥匙','检查停车场广告牌','搜索橙色面包车1101°,589°→武士刀'], reward:'武士刀秘诀 + 21500 XP' },
  q_snowfield:  { type:'side', name:'雪地',           en:'You Rip What You Sow',         steps:['通过陷阱小路到农场','阅读991°,594°提示','挖掘四棵头骨树（1091°、1093°、1100°、1104°）'], reward:'9000 XP' },

  q_money:      { type:'side', name:'金钱',           en:'Dirty Money',                  steps:['阅读565°,737°信件','前往553°,699°照片地点','找枯树533°,730°','挖掘570°,714°宝藏（棒球场右上）'], reward:'20000 XP' },

// ════════════════════════════════════════════════
// BUILD MARKERS
// ════════════════════════════════════════════════
function buildMarkers() {
  MARKER_DEFS.forEach(m => {
    const latlng = gameToLatLng(m.gx, m.gy);
    const icon   = mkIcon(m.icon, m.color);
    const marker = L.marker(latlng, { icon });
    marker.markerData = m;

    // Popup content
    const q = m.questId ? QUESTS[m.questId] : null;
    let html = `<div class="popup-inner">`;
    html += `<div class="popup-type">${getTypeLabel(m.type)}</div>`;
    if (q) {
      const badgeCls = { main:'badge-main', side:'badge-side', key:'badge-key' }[m.questType] || 'badge-side';
      const typeLabel = { main:'主线', side:'支线', key:'关键支线' }[m.questType] || '支线';
      html += `<span class="popup-badge ${badgeCls}">${typeLabel}</span><br>`;
    }
    html += `<div class="popup-title">${m.name}</div>`;
    html += `<div class="popup-region">📍 ${m.region}</div>`;
    html += `<div class="popup-coords">坐标: ${m.gx}°, ${m.gy}°</div>`;
    html += `<div class="popup-desc">${m.detail}</div>`;
    if (q) {
      html += `<div class="popup-divider"></div>`;
      html += `<div class="popup-quest-title">${q.name}</div>`;
      q.steps.forEach(s => { html += `<div class="popup-step">${s}</div>`; });
      html += `<div class="popup-reward">${q.reward}</div>`;
    }
    html += `</div>`;
    marker.bindPopup(html, { maxWidth: 320, className: '' });

    // On click: highlight quest card
    marker.on('click', () => {
      if (m.questId) highlightQuestCard(m.questId);
    });

    layerGroups[m.type] && layerGroups[m.type].addLayer(marker);
  });
}

function getTypeLabel(t) {
  return { campfire:'🔥 营火', tower:'📡 链塔', quest:'❗ 任务', tomb:'⚰ 古墓', fishing:'🎣 钓鱼点', treasure:'💎 宝藏', boss:'☠ BOSS', resource:'⚙ 资源点', farmable:'🌱 农场', rift:'✨ 神力裂隙', chest:'📦 宝箱' }[t] || t;
}

// ════════════════════════════════════════════════
// FILTER BAR
// ════════════════════════════════════════════════
function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  FILTER_DEFS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'chip on';
    btn.innerHTML = `<span class="dot" style="background:${f.color}"></span>${f.label}`;
    btn.addEventListener('click', () => {
      if (activeFilters.has(f.id)) {
        activeFilters.delete(f.id);
        btn.classList.remove('on');
        map.removeLayer(layerGroups[f.id]);
      } else {
        activeFilters.add(f.id);
        btn.classList.add('on');
        map.addLayer(layerGroups[f.id]);
      }
    });
    bar.appendChild(btn);
  });
}

// ════════════════════════════════════════════════
// REGION LIST (left sidebar)
// ════════════════════════════════════════════════
function buildRegionList() {
  const list = document.getElementById('regionList');
  REGIONS.forEach(r => {
    const el = document.createElement('div');
    el.className = 'ritem';
    el.dataset.rid = r.id;
    el.innerHTML = `<span class="rdot" style="background:${r.color}"></span>
      <div><div class="rname">${r.cn}</div></div>`;
    el.addEventListener('click', () => {
      document.querySelectorAll('.ritem').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      // Fly to region
      const ll = gameToLatLng(r.gx, r.gy);
      map.setView(ll, 4, { animate: true });
      // Filter quest panel
      buildQuestPanel(r.cn);
    });
    list.appendChild(el);
  });
}

// ════════════════════════════════════════════════
// QUEST PANEL (right sidebar)
// ════════════════════════════════════════════════
function buildQuestPanel(regionFilter) {
  const list  = document.getElementById('questList');
  const title = document.getElementById('questPanelTitle');
  list.innerHTML = '';
  title.textContent = regionFilter ? `▸ ${regionFilter} 任务攻略` : '▸ 全部任务攻略';

  const questMarkers = MARKER_DEFS.filter(m => m.type === 'quest' && (!regionFilter || m.region === regionFilter));
  if (!questMarkers.length) {
    list.innerHTML = '<div class="empty-msg">该区域暂无任务数据</div>';
    return;
  }

  questMarkers.forEach(m => {
    const q = QUESTS[m.questId];
    if (!q) return;
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'qcard_' + m.questId;
    const badgeCls = { main:'badge-main', side:'badge-side', key:'badge-key' }[q.type] || 'badge-side';
    const typeLabel = { main:'主线', side:'支线', key:'关键支线' }[q.type] || '支线';
    card.innerHTML = `
      <div class="qcard-head" onclick="toggleQCard(this)">
        <span class="qtype ${badgeCls}" style="font-size:9px;padding:1px 5px;border-radius:2px;">${typeLabel}</span>
        <span class="qcard-name">${q.name}</span>
        <span class="qcard-area">${m.region}</span>
      </div>
      <div class="qcard-body">
        <div class="qcard-coord">📍 ${m.gx}°, ${m.gy}°</div>
        ${q.steps.map(s=>`<div class="qstep">${s}</div>`).join('')}
        <div class="qreward">${q.reward}</div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleQCard(head) {
  head.nextElementSibling.classList.toggle('open');
}

function highlightQuestCard(questId) {
  const card = document.getElementById('qcard_' + questId);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  card.classList.add('highlight');
  const body = card.querySelector('.qcard-body');
  if (body) body.classList.add('open');
  setTimeout(() => card.classList.remove('highlight'), 2000);
}

// ════════════════════════════════════════════════
// LEGEND (floating)
// ════════════════════════════════════════════════
function buildLegend() {
  const div = document.createElement('div');

    FILTER_DEFS.map(f =>
      `<div class="legend-row"><img class="legend-icon" src="${ICON_BASE}${iconName(f.id)}.png" onerror="this.style.opacity=0.3"/>${f.label}</div>`
    ).join('');
  document.getElementById('map').appendChild(div);
}
function iconName(type) {
  return { campfire:'icon-campfire', tower:'icon-link-tower', quest:'icon-quest', tomb:'icon-tomb', fishing:'icon-fishing-spot', treasure:'icon-buried-treasure', boss:'icon-boss', resource:'icon-fixable', farmable:'icon-farmable', rift:'icon-rift' }[type] || 'icon-unknown';
}
