<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYSMANTLE 交互式地图</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+SC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">DYSMANTLE <span class="logo-sub">交互式地图 · 主岛全攻略</span></div>
    <div class="sep"></div>
    <div class="filters" id="filterBar"></div>
    <div class="ml-auto"></div>
    <button id="clusterToggle" onclick="toggleClustering()" title="开启/关闭图标聚合"
  style="display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:3px;
  border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#ef4444;
  font-family:'Noto Sans SC',sans-serif;font-size:11px;cursor:pointer;
  transition:all .15s;white-space:nowrap;">
  <span id="clusterIcon">○</span><span id="clusterLabel">聚合: 关</span>
</button>
<div class="coord-display" id="coordDisplay">坐标: — , —</div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="sidebar-title">▸ 地图区域</div>
      <div id="regionList"></div>
    </div>
    <div id="map">
      <div id="clearQuestBtn">
        <span>✕</span><span id="clearQuestLabel">清除任务标记</span>
      </div>
    </div>
    <div id="questPanel">
      <div class="qpanel-top">
        <div id="questPanelTitle">
          <span id="panelTitleText">▸ 全部任务攻略</span>
          <span class="qcount" id="qcount"></span>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" type="text" placeholder="搜索任务名、步骤、奖励…" autocomplete="off"/>
          <button class="search-clear" id="searchClear">✕</button>
        </div>
        <div class="search-tabs" id="searchTabs">
          <button class="stab active" data-type="all">全部</button>
          <button class="stab" data-type="key">关键支线</button>
          <button class="stab" data-type="side">普通支线</button>
          <button class="stab" data-type="main">主线</button>
        </div>
      </div>
      <div id="questList"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>


<script src="app.js"></script>
</body>
</html>
