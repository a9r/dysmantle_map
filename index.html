<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYSMANTLE 交互式地图</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+SC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090b;--panel:#10141a;--panel2:#161c26;--border:#1e2a3a;--accent:#d4952a;--accent2:#4cc9f0;--red:#ef4444;--gold:#fbbf24;--purple:#a78bfa;--green:#4ade80;--blue:#60a5fa;--text:#c8d4e0;--dim:#4a5c72;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;}
#topbar{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);padding:0 14px;height:46px;display:flex;align-items:center;gap:10px;position:relative;z-index:1000;}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent) 30%,var(--accent) 70%,transparent);opacity:.4;}
.logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase;white-space:nowrap;}
.logo-sub{font-size:11px;color:var(--dim);letter-spacing:1px;margin-left:8px;font-weight:400;}
.sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
.filters{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.chip{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:11px;cursor:pointer;transition:all .15s;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;}
.chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.chip.on{background:rgba(255,255,255,.05);color:var(--text);border-color:rgba(255,255,255,.2);}
.chip:hover{border-color:var(--accent);}
.ml-auto{margin-left:auto;}
.coord-display{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);background:var(--bg);border:1px solid var(--border);padding:3px 8px;border-radius:3px;white-space:nowrap;min-width:160px;text-align:center;}
#body{flex:1;display:flex;overflow:hidden;}
#sidebar{width:190px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-title{padding:8px 12px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);flex-shrink:0;}
#regionList{overflow-y:auto;flex:1;}
#regionList::-webkit-scrollbar{width:3px;}
#regionList::-webkit-scrollbar-thumb{background:var(--border);}
.ritem{padding:6px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(30,42,58,.5);}
.ritem:hover{background:rgba(212,149,42,.06);border-left-color:rgba(212,149,42,.4);}
.ritem.active{background:rgba(212,149,42,.1);border-left-color:var(--accent);}
.rdot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.rname{font-size:12px;font-weight:700;}
#map{flex:1;position:relative;}
.leaflet-container{background:#060810;}
.leaflet-control-zoom{border:1px solid var(--border)!important;background:var(--panel)!important;}
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important;font-size:16px!important;line-height:26px!important;}
.leaflet-control-zoom a:hover{background:var(--panel2)!important;color:var(--accent)!important;}
.leaflet-top.leaflet-right{top:auto!important;bottom:40px!important;}
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--border)!important;border-radius:4px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;color:var(--text)!important;padding:0!important;min-width:260px;max-width:340px;}
.leaflet-popup-tip{background:var(--border)!important;}
.leaflet-popup-content{margin:0!important;}
.pi{padding:12px 14px;}
.pt{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.pn{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:2px;font-family:'Rajdhani',sans-serif;}
.pr{font-size:11px;color:var(--dim);margin-bottom:6px;}
.pc{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent2);margin-bottom:7px;}
.pd{font-size:12px;line-height:1.6;color:var(--text);}
.pdiv{height:1px;background:var(--border);margin:9px 0;}
.pqt{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:5px;}
.ps{font-size:11px;color:var(--dim);padding:2px 0 2px 12px;position:relative;line-height:1.55;}
.ps::before{content:'▸';position:absolute;left:0;color:var(--accent2);font-size:9px;top:3px;}
.prew{margin-top:6px;font-size:11px;color:var(--gold);}
.prew::before{content:'✦ 奖励: ';}
.pbadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:2px;margin-bottom:5px;}
.bm{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.bs{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3);}
.bk{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);}
#questPanel{width:300px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.qpanel-top{flex-shrink:0;border-bottom:1px solid var(--border);}
#questPanelTitle{padding:8px 12px 6px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:6px;}
#questPanelTitle .qcount{margin-left:auto;font-size:10px;letter-spacing:0;text-transform:none;color:var(--accent);font-family:'Share Tech Mono',monospace;}
.search-wrap{padding:6px 10px 8px;position:relative;}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:12px;padding:6px 30px 6px 30px;outline:none;transition:border-color .15s;}
.search-input::placeholder{color:var(--dim);}
.search-input:focus{border-color:var(--accent2);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none;}
.search-clear{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:color .15s;display:none;line-height:1;background:none;border:none;}
.search-clear:hover{color:var(--text);}
.search-clear.visible{display:block;}
.search-tabs{display:flex;gap:4px;padding:0 10px 8px;flex-wrap:wrap;}
.stab{font-size:10px;padding:2px 7px;border-radius:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Noto Sans SC',sans-serif;transition:all .12s;white-space:nowrap;}
.stab.active{background:rgba(212,149,42,.15);border-color:var(--accent);color:var(--accent);}
.stab:hover{border-color:rgba(212,149,42,.5);}
.no-results{padding:24px 16px;text-align:center;color:var(--dim);font-size:12px;}
.no-results .nr-icon{font-size:28px;margin-bottom:8px;opacity:.4;}
.no-results .nr-kw{color:var(--accent);font-style:italic;}
.hl-match{background:rgba(212,149,42,.3);color:var(--accent);border-radius:2px;padding:0 1px;}
#questList{overflow-y:auto;flex:1;padding:7px;}
#questList::-webkit-scrollbar{width:3px;}
#questList::-webkit-scrollbar-thumb{background:var(--border);}
.qcard{background:var(--bg);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;overflow:hidden;transition:border-color .15s;}
.qcard:hover{border-color:rgba(212,149,42,.3);}
.qcard.hl{border-color:var(--accent)!important;box-shadow:0 0 12px rgba(212,149,42,.25);}
.qcard.active-quest{border-color:var(--accent2)!important;box-shadow:0 0 14px rgba(76,201,240,.2);}
.qh{padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.02);user-select:none;}
.qh:hover{background:rgba(255,255,255,.04);}
.qt{font-size:9px;padding:1px 5px;border-radius:2px;flex-shrink:0;}
.qn{font-size:12px;font-weight:700;flex:1;}
.qa{font-size:10px;color:var(--dim);flex-shrink:0;}

/* Show-on-map button */
.qmap-btn{
  font-size:10px;padding:2px 7px;border-radius:3px;cursor:pointer;
  border:1px solid var(--border);background:rgba(76,201,240,.08);
  color:var(--accent2);font-family:'Noto Sans SC',sans-serif;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:3px;
}
.qmap-btn:hover{background:rgba(76,201,240,.18);border-color:var(--accent2);}
.qmap-btn.active{background:rgba(76,201,240,.22);border-color:var(--accent2);color:#fff;}

.qb{padding:0 10px 9px;display:none;}
.qb.open{display:block;}
.qco{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent2);margin:4px 0 5px;}
.qst{font-size:11px;color:var(--dim);padding:2px 0 2px 12px;position:relative;line-height:1.5;}
.qst::before{content:'▸';position:absolute;left:0;color:var(--accent2);font-size:9px;top:3px;}
.qrw{margin-top:6px;font-size:11px;color:var(--gold);}
.qrw::before{content:'✦ 奖励: ';}

/* ── QUEST LOCATION MARKERS on map ── */
/* Numbered step markers */
.step-marker-wrap{
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;border:2.5px solid;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.7);
  cursor:pointer;
}
/* Pickup marker (star shape) */
.pickup-marker{
  display:flex;align-items:center;justify-content:center;
  font-size:16px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));
  cursor:pointer;
}
/* Quest connector line pulse */
@keyframes dash-anim{to{stroke-dashoffset:-20;}}

/* Clear button in map */
#clearQuestBtn{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  z-index:900;background:rgba(10,14,20,.92);border:1px solid var(--accent2);
  color:var(--accent2);padding:5px 14px;border-radius:4px;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;font-size:12px;display:none;
  gap:6px;align-items:center;transition:all .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
#clearQuestBtn.visible{display:flex;}
#clearQuestBtn:hover{background:rgba(76,201,240,.15);}

/* Quest map tooltip */
.quest-loc-tooltip{
  background:rgba(10,14,20,.95)!important;
  border:1px solid var(--border)!important;
  color:var(--text)!important;
  border-radius:4px!important;
  font-family:'Noto Sans SC',sans-serif!important;
  font-size:11px!important;
  padding:4px 8px!important;
  box-shadow:0 2px 8px rgba(0,0,0,.5)!important;
  white-space:nowrap!important;
}
.region-label{background:transparent;border:none;box-shadow:none;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">DYSMANTLE <span class="logo-sub">交互式地图 · 主岛全攻略</span></div>
    <div class="sep"></div>
    <div class="filters" id="filterBar"></div>
    <div class="ml-auto"></div>
    <div class="coord-display" id="coordDisplay">坐标: — , —</div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="sidebar-title">▸ 地图区域</div>
      <div id="regionList"></div>
    </div>
    <div id="map">
      <div id="clearQuestBtn">
        <span>✕</span><span id="clearQuestLabel">清除任务标记</span>
      </div>
    </div>
    <div id="questPanel">
      <div class="qpanel-top">
        <div id="questPanelTitle">
          <span id="panelTitleText">▸ 全部任务攻略</span>
          <span class="qcount" id="qcount"></span>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" type="text" placeholder="搜索任务名、步骤、奖励…" autocomplete="off"/>
          <button class="search-clear" id="searchClear">✕</button>
        </div>
        <div class="search-tabs" id="searchTabs">
          <button class="stab active" data-type="all">全部</button>
          <button class="stab" data-type="key">关键支线</button>
          <button class="stab" data-type="side">普通支线</button>
          <button class="stab" data-type="main">主线</button>
        </div>
      </div>
      <div id="questList"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const TILE='https://ogmods.github.io/dysmantle-map/tiles/{z}/{x}/{y}.jpg';
const IBASE='https://ogmods.github.io/dysmantle-map/images/icons/';
const NZ=5,R=12.8;

const map=L.map('map',{crs:L.CRS.Simple,maxZoom:7,minZoom:1,maxBounds:[[0,0],[-384,768]],maxBoundsViscosity:.7,attributionControl:false,zoomControl:true});
map.fitBounds([[-384,0],[0,768]]);
map.zoomControl.setPosition('bottomright');
L.tileLayer(TILE,{maxNativeZoom:NZ,minNativeZoom:1,tms:false,bounds:[[-384,0],[0,768]],
  errorTileUrl:'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}).addTo(map);
map.on('mousemove',e=>{
  const pt=map.project(e.latlng,NZ);
  document.getElementById('coordDisplay').textContent=`坐标: ${Math.round(pt.x/R)}°, ${Math.round(pt.y/R)}°`;
});
function g2l(gx,gy){return map.unproject([gx*R,gy*R],NZ);}

// ── Icon factory ──
const IC={};
function mkIcon(name,color){
  const k=name+color;if(IC[k])return IC[k];
  return IC[k]=L.divIcon({className:'',
    html:`<div style="display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:2px solid ${color};background:rgba(0,0,0,.7);"><img src="${IBASE}${name}.png" style="width:18px;height:18px;" onerror="this.style.display='none'"/></div>`,
    iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-18]});
}

// ── Region borders ──
const RPOLYS=[
  {cn:'迦百农',color:'#e8a020',pts:[[1275,460],[1460,460],[1460,580],[1390,580],[1390,560],[1275,560]]},
  {cn:'卡纳维拉尔',color:'#4cc9f0',pts:[[1460,410],[1640,410],[1640,490],[1460,490]]},
  {cn:'柴火',color:'#86efac',pts:[[1175,330],[1275,330],[1275,460],[1175,460],[1145,420],[1145,370]]},
  {cn:'篱笆地',color:'#6ee7b7',pts:[[1390,560],[1460,560],[1460,670],[1390,670]]},
  {cn:'沼泽草地',color:'#34d399',pts:[[1460,670],[1640,670],[1640,790],[1460,790]]},
  {cn:'北欧化工',color:'#67e8f9',pts:[[1175,145],[1460,145],[1460,330],[1390,330],[1390,260],[1275,260],[1275,330],[1175,330]]},
  {cn:'大角星',color:'#93c5fd',pts:[[1460,145],[1640,145],[1640,410],[1460,410]]},
  {cn:'爱尔兰',color:'#a3e635',pts:[[950,200],[1175,200],[1175,370],[1145,370],[1145,420],[1060,420],[1060,340],[950,340]]},
  {cn:'冰霜',color:'#bfdbfe',pts:[[820,100],[1175,100],[1175,200],[950,200],[950,260],[820,260]]},
  {cn:'北极星',color:'#e0f2fe',pts:[[310,80],[820,80],[820,260],[620,260],[620,200],[450,200],[450,150],[310,150]]},
  {cn:'冰霜号角',color:'#a5f3fc',pts:[[130,100],[310,100],[310,300],[130,300]]},
  {cn:'峡谷',color:'#fb923c',pts:[[820,500],[1175,500],[1175,700],[1060,700],[1060,420],[950,420],[950,500]]},
  {cn:'中枢',color:'#c084fc',pts:[[450,290],[820,290],[820,500],[620,500],[620,480],[450,480]]},
  {cn:'西港',color:'#fda4af',pts:[[200,310],[450,310],[450,490],[310,490],[310,410],[200,410]]},
  {cn:'夕阳沙漠',color:'#fbbf24',pts:[[450,490],[820,490],[820,720],[560,720],[560,800],[450,800]]},
  {cn:'蛇工',color:'#f87171',pts:[[820,720],[1175,720],[1175,880],[820,880]]},
  {cn:'瓦肯镇',color:'#fca5a5',pts:[[100,480],[200,480],[200,650],[130,650],[130,490],[100,490]]},
  {cn:'索拉里斯星',color:'#fde68a',pts:[[100,490],[450,490],[450,800],[200,800],[200,870],[100,870]]},
  {cn:'王冠地下',color:'#d8b4fe',pts:[[820,290],[950,290],[950,420],[820,420]]},
  {cn:'王冠',color:'#f9a8d4',pts:[[820,420],[1060,420],[1060,500],[820,500]]},
];
RPOLYS.forEach(rp=>{
  L.polygon(rp.pts.map(([gx,gy])=>g2l(gx,gy)),{color:rp.color,fill:false,weight:1.5,opacity:0.55,interactive:false}).addTo(map);
  const cx=rp.pts.reduce((s,p)=>s+p[0],0)/rp.pts.length,cy=rp.pts.reduce((s,p)=>s+p[1],0)/rp.pts.length;
  L.marker(g2l(cx,cy),{icon:L.divIcon({className:'region-label',
    html:`<div style="color:${rp.color};opacity:.65;font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,1);white-space:nowrap;pointer-events:none;">${rp.cn}</div>`,
    iconAnchor:[30,8]}),interactive:false}).addTo(map);
});

// ════════════════════════════════════════════════
// QUEST DATABASE WITH LOCATIONS
// Each quest has:
//   locs: array of { label, gx, gy, type }
//   type: 'start'=接取点(橙), 'key'=关键地点(蓝), 'end'=完成/奖励(绿), 'boss'=BOSS(红), 'dig'=挖掘(黄)
// ════════════════════════════════════════════════
const QD={
  q_crowbar:{t:'side',n:'撬棍摧毁障碍物',en:'Crowbar Through Obstacles',
    s:['找废金属×2、废木料×5','在营火升级撬棍','摧毁堵住门口的柜子（1335°,537°）'],rw:'600 XP',
    locs:[{label:'接取任务',gx:1335,gy:540,tp:'start'},{label:'摧毁柜子',gx:1335,gy:537,tp:'end'}]},
  q_basic:{t:'side',n:'初级必需品',en:'Basic Necessities',
    s:['找到链塔(1391°,527°)','升级背包（植物物质×10，废织物×4）','提升人物等级'],rw:'1000 XP',
    locs:[{label:'接取任务',gx:1365,gy:518,tp:'start'},{label:'迦百农链塔',gx:1391,gy:527,tp:'key'}]},
  q_stronger:{t:'side',n:'变强',en:'Getting Stronger',
    s:['制作烹饪锅','烹饪番茄汤（菜谱在1371°,513°）','发明飞刀'],rw:'1500 XP',
    locs:[{label:'接取任务',gx:1419,gy:514,tp:'start'},{label:'番茄汤菜谱位置',gx:1371,gy:513,tp:'key'}]},
  q_basketball:{t:'side',n:'棒球',en:'Fast Basketball',
    s:['在迦百农1362°,537°接取任务','60秒内击败5个敌人'],rw:'3000 XP',
    locs:[{label:'接取任务 / 战斗区域',gx:1362,gy:537,tp:'start'}]},
  q_buried:{t:'side',n:'埋藏宝藏',en:'Buried Treasures',
    s:['在1425°,537°接任务获取藏宝地图','挖掘1430°,533°','挖掘1413°,548°'],rw:'3500 XP',
    locs:[{label:'接取任务',gx:1425,gy:537,tp:'start'},{label:'宝藏挖掘点A',gx:1430,gy:533,tp:'dig'},{label:'宝藏挖掘点B',gx:1413,gy:548,tp:'dig'}]},
  q_farming:{t:'side',n:'初级农作物',en:'Farming Basics',
    s:['发明种子袋（LV.5）','种植种子（箱内有玉米×4）','收获农作物'],rw:'4500 XP',
    locs:[{label:'接取任务 / 农场',gx:1484,gy:463,tp:'start'},{label:'玉米箱子',gx:1488,gy:465,tp:'key'}]},
  q_building:{t:'key',n:'建筑工程',en:'Construction Work',
    s:['发明建筑工具（LV.9）','建造3×3混泥土平台+台阶','建造木质门道×1、木墙窗×2、木墙×9','建造木椅×1、圆形餐桌×1、金属框架床×1','建造装饰×3','建造木门×1（需稀有木材）'],rw:'归家传送门秘诀 + 1500 XP',

// QUEST LOCATION MARKERS — temp layer
// ════════════════════════════════════════════════
let questMarkerLayer=null;
let activeQuestId=null;

// Colors per type
const LOC_COLORS={
  start:'#ff9800',   // 接取点 — 橙色
  key:'#4cc9f0',     // 关键地点 — 蓝色
  end:'#4ade80',     // 完成/奖励 — 绿色
  boss:'#ef4444',    // BOSS — 红色
  dig:'#fbbf24',     // 挖掘 — 黄色
};
const LOC_ICONS={
  start:'⭐',key:'📍',end:'✅',boss:'☠',dig:'⛏',
};
const LOC_LABELS={
  start:'接取点',key:'关键地点',end:'完成点',boss:'BOSS',dig:'挖掘点',
};

function clearQuestMarkers(){
  if(questMarkerLayer){map.removeLayer(questMarkerLayer);questMarkerLayer=null;}
  activeQuestId=null;
  // Reset all card styles
  document.querySelectorAll('.qcard.active-quest').forEach(c=>c.classList.remove('active-quest'));
  document.querySelectorAll('.qmap-btn.active').forEach(b=>{b.classList.remove('active');b.textContent='📍 显示位置';});
  document.getElementById('clearQuestBtn').classList.remove('visible');
}

function showQuestOnMap(qid){
  const q=QD[qid];
  if(!q||!q.locs||!q.locs.length)return;

  // If already showing this quest, hide it
  if(activeQuestId===qid){clearQuestMarkers();return;}
  clearQuestMarkers();
  activeQuestId=qid;

  questMarkerLayer=L.layerGroup().addTo(map);

  const pts=[];
  q.locs.forEach((loc,i)=>{
    const ll=g2l(loc.gx,loc.gy);
    pts.push(ll);
    const color=LOC_COLORS[loc.tp]||'#aaa';
    const emoji=LOC_ICONS[loc.tp]||'📍';
    const num=q.locs.length>1?(i+1):'';

    // Marker icon
    const icon=L.divIcon({
      className:'',
      html:`<div class="step-marker-wrap" style="
        width:${num?32:28}px;height:${num?32:28}px;
        border-color:${color};
        background:rgba(8,9,11,0.88);
        color:${color};
        font-size:${num?13:15}px;
      ">${num||emoji}</div>`,
      iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-20],
    });

    const mk=L.marker(ll,{icon,zIndexOffset:2000});
    // Tooltip
    mk.bindTooltip(
      `<div style="font-size:11px;font-weight:700;color:${color};">${emoji} ${LOC_LABELS[loc.tp]||''}</div>`+
      `<div style="font-size:12px;margin-top:2px;">${loc.label}</div>`+
      `<div style="font-family:'Share Tech Mono',monospace;font-size:10px;opacity:.7;margin-top:2px;">${loc.gx}°, ${loc.gy}°</div>`,
      {className:'quest-loc-tooltip',permanent:false,direction:'top',offset:[0,-18]}
    );
    // Popup
    mk.bindPopup(
      `<div class="pi">
        <div class="pt" style="color:${color};">${emoji} ${LOC_LABELS[loc.tp]||''} · ${q.n}</div>
        <div class="pn" style="color:${color};">${loc.label}</div>
        <div class="pc">${loc.gx}°, ${loc.gy}°</div>
      </div>`,{maxWidth:260,className:''}
    );
    mk.addTo(questMarkerLayer);
  });

  // Draw polyline connecting steps (dashed)
  if(pts.length>1){
    L.polyline(pts,{
      color:'rgba(76,201,240,0.5)',weight:2,
      dashArray:'6 5',
      interactive:false,
    }).addTo(questMarkerLayer);
  }

  // Fit map to show all markers (with some padding)
  if(pts.length===1){
    map.setView(pts[0],Math.max(map.getZoom(),3),{animate:true,duration:.5});
  } else {
    const bounds=L.latLngBounds(pts);
    map.fitBounds(bounds,{padding:[60,60],maxZoom:5,animate:true,duration:.5});
  }

  // Update UI
  document.getElementById('clearQuestBtn').classList.add('visible');
  document.getElementById('clearQuestLabel').textContent=`${q.n} · 显示中 (${q.locs.length}个位置)`;

  // Highlight card
  const card=document.getElementById('qcard_'+qid);
  if(card){
    card.classList.add('active-quest');
    card.querySelector('.qb').classList.add('open');
  }

  // Update btn text
  document.querySelectorAll(`[data-mapqid="${qid}"]`).forEach(b=>{
    b.classList.add('active');b.innerHTML='📍 隐藏位置';
  });
}

// Clear button
document.getElementById('clearQuestBtn').addEventListener('click',clearQuestMarkers);
// Click map to clear
map.on('click',()=>{if(activeQuestId)clearQuestMarkers();});

// ── Build markers ──
function buildMarkers(){
  const TL={campfire:'🔥 营火',tower:'📡 链塔',quest:'❗ 任务',tomb:'⚰ 古墓',fishing:'🎣 钓鱼',treasure:'💎 宝藏',boss:'☠ BOSS',resource:'⚙ 资源',farmable:'🌱 农场',rift:'✨ 裂隙'};
  MD.forEach(m=>{
    const mk=L.marker(g2l(m.gx,m.gy),{icon:mkIcon(m.ic,m.cl)});
    const q=m.qid?QD[m.qid]:null;
    let h=`<div class="pi"><div class="pt">${TL[m.tp]||m.tp}</div>`;
    if(q){const bc={main:'bm',side:'bs',key:'bk'}[m.qt]||'bs';h+=`<span class="pbadge ${bc}">${{main:'主线',side:'支线',key:'关键支线'}[m.qt]}</span><br>`;}
    h+=`<div class="pn">${m.n}</div><div class="pr">📍 ${m.r}</div><div class="pc">坐标: ${m.gx}°, ${m.gy}°</div><div class="pd">${m.d}</div>`;
    if(q){
      h+=`<div class="pdiv"></div><div class="pqt">${q.n}</div>`;
      q.s.forEach(s=>{h+=`<div class="ps">${s}</div>`;});
      h+=`<div class="prew">${q.rw}</div>`;
    }
    h+=`</div>`;
    mk.bindPopup(h,{maxWidth:340,className:''});
    mk.on('click',()=>{if(m.qid){hlCard(m.qid);}});
    if(LG[m.tp])LG[m.tp].addLayer(mk);
  });
}

let currentRegion=null;
function buildRegionList(){
  const list=document.getElementById('regionList');
  const all=document.createElement('div');all.className='ritem active';
  all.innerHTML=`<span class="rdot" style="background:#d4952a"></span><div><div class="rname">全 部</div></div>`;

// ── Search state ──
let currentTab='all',currentKw='';
const QENTRIES=[];
const seen=new Set();
MD.forEach(m=>{
  if(m.tp!=='quest'||!m.qid||seen.has(m.qid))return;
  seen.add(m.qid);const q=QD[m.qid];if(!q)return;
  QENTRIES.push({qid:m.qid,qt:m.qt||q.t,gx:m.gx,gy:m.gy,region:m.r,
    search:(q.n+' '+(q.en||'')+' '+q.s.join(' ')+' '+q.rw+' '+m.r).toLowerCase()});
});
QENTRIES.sort((a,b)=>({key:0,main:1,side:2}[a.qt]||2)-({key:0,main:1,side:2}[b.qt]||2));

function hlT(text,kw){
  if(!kw)return text;
  return text.replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="hl-match">${m}</span>`);
}

// ── Build location legend for quest card ──
function buildLocLegend(q){
  if(!q.locs||!q.locs.length)return '';
  const typesSeen=new Set(q.locs.map(l=>l.tp));
  const items=[...typesSeen].map(tp=>{
    const col=LOC_COLORS[tp]||'#aaa';
    const em=LOC_ICONS[tp]||'📍';
    return `<span style="color:${col};font-size:11px;">${em} ${LOC_LABELS[tp]||tp}</span>`;
  }).join('<span style="color:var(--dim);margin:0 6px;">·</span>');
  return `<div style="margin-top:7px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;border-top:1px solid var(--border);padding-top:7px;">${items}</div>`;
}

function runSearch(){
  const kw=currentKw.trim().toLowerCase();
  const list=document.getElementById('questList');list.innerHTML='';
  const results=QENTRIES.filter(e=>{
    if(currentRegion&&e.region!==currentRegion&&e.region!=='通用')return false;
    if(currentTab!=='all'&&e.qt!==currentTab)return false;
    if(kw&&!e.search.includes(kw))return false;
    return true;
  });
  document.getElementById('qcount').textContent=results.length?`${results.length} 条`:'';
  if(!results.length){
    list.innerHTML=`<div class="no-results"><div class="nr-icon">🔍</div>${kw?`未找到含 <span class="nr-kw">"${kw}"</span> 的任务`:'该区域暂无任务数据'}</div>`;
    return;
  }
  results.forEach(e=>{
    const q=QD[e.qid];
    const card=document.createElement('div');
    card.className='qcard'+(activeQuestId===e.qid?' active-quest':'');
    card.id='qcard_'+e.qid;
    const bc={main:'bm',side:'bs',key:'bk'}[e.qt]||'bs';
    const tl={main:'主线',side:'支线',key:'关键'}[e.qt]||'支线';
    const hasLocs=q.locs&&q.locs.length>0;
    const isActive=activeQuestId===e.qid;
    card.innerHTML=`
      <div class="qh" onclick="toggleQ(this,'${e.qid}')">
        <span class="qt ${bc}">${tl}</span>
        <span class="qn">${hlT(q.n,kw)}</span>
        <span class="qa">${hlT(e.region,kw)}</span>
        ${hasLocs?`<button class="qmap-btn${isActive?' active':''}" data-mapqid="${e.qid}" onclick="event.stopPropagation();showQuestOnMap('${e.qid}')" title="在地图上显示任务地点">📍 ${isActive?'隐藏位置':'显示位置'}</button>`:''}
      </div>
      <div class="qb${(kw||isActive)?' open':''}">
        <div class="qco">📍 接取坐标: ${e.gx}°, ${e.gy}°</div>
        ${q.s.map(s=>`<div class="qst">${hlT(s,kw)}</div>`).join('')}
        <div class="qrw">${hlT(q.rw,kw)}</div>
        ${buildLocLegend(q)}
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('panelTitleText').textContent=currentRegion?`▸ ${currentRegion} 任务`:'▸ 全部任务攻略';
}

function toggleQ(h,qid){
  h.nextElementSibling.classList.toggle('open');
}

function hlCard(qid){
  const c=document.getElementById('qcard_'+qid);if(!c)return;
  c.scrollIntoView({behavior:'smooth',block:'center'});
  c.classList.add('hl');
  c.querySelector('.qb').classList.add('open');
  setTimeout(()=>c.classList.remove('hl'),2000);
}

// Search events
const si=document.getElementById('searchInput'),sc=document.getElementById('searchClear');
si.addEventListener('input',()=>{currentKw=si.value;sc.classList.toggle('visible',currentKw.length>0);runSearch();});
si.addEventListener('keydown',e=>{if(e.key==='Escape'){si.value='';currentKw='';sc.classList.remove('visible');runSearch();}});
